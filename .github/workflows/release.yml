name: Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}  # Use PAT instead of GITHUB_TOKEN

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Verify release package signatures
        # The repository doesn't include a package-lock.json, so we verify
        # signatures using a temporary lockfile in /tmp.
        run: |
          mkdir -p /tmp/release-tools
          cd /tmp/release-tools
          npm init -y
          npm install --package-lock-only --ignore-scripts semantic-release@25.0.5 @semantic-release/changelog@6.0.3 @semantic-release/exec@7.1.0 @semantic-release/git@10.0.1 @semantic-release/github@12.0.9
          npm audit signatures

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}  # Use PAT here too
        run: npx -y -p semantic-release@25.0.5 -p @semantic-release/changelog@6.0.3 -p @semantic-release/exec@7.1.0 -p @semantic-release/git@10.0.1 -p @semantic-release/github@12.0.9 semantic-release
