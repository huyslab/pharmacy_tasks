<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/">
    <title>Vigour Task</title>

    <!-- Import map for module resolution -->
    <script type="importmap">
        {
            "imports": {
                "@utils/": "/core/utils/",
                "@jspsych/": "/core/jspsych/",
                "@tasks/": "/tasks/",
                "@api/": "/api/",
                "@images/": "/assets/images/"
            }
        }
    </script>

    <!-- jsPsych Core Files -->
    <script src="/core/jspsych/jspsych.js"></script>
    <script src="/core/jspsych/plugin-html-keyboard-response.js"></script>
    <script src="/core/jspsych/plugin-html-button-response.js"></script>
    <script src="/core/jspsych/plugin-fullscreen.js"></script>
    <script src="/core/jspsych/plugin-call-function.js"></script>
    <script src="/core/jspsych/plugin-instructions.js"></script>
    <script src="/core/jspsych/plugin-preload.js"></script>

        
    <!-- Core utilities -->
    <script type="module" src="/core/utils/index.js"></script>
    
    <!-- CSS Styles -->
    <link href="/core/jspsych/jspsych.css" rel="stylesheet" type="text/css" />

    <style>
        html, body {
            overscroll-behavior: none; /* disable pull-to-refresh and overscroll bounce during the task */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        
        #display_element {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .instructions p {
            max-width: min(700px, 92vw);
            text-align: left;
            margin: 1em 0;
        }

        /* Portrait gate: block phone-landscape (short viewport); tablets (taller) are exempt */
        #rotate-overlay { display: none; }
        @media (orientation: landscape) and (max-height: 500px) {
            #rotate-overlay {
                display: flex;
                position: fixed;
                top: 0;
                right: 0;
                bottom: 0;
                left: 0;
                z-index: 100000;
                background: #ffffff;
                align-items: center;
                justify-content: center;
                text-align: center;
                padding: 24px;
                box-sizing: border-box;
            }
        }
        #rotate-overlay p {
            font-size: clamp(18px, 5vw, 24px);
            color: #182b4b;
            line-height: 1.4;
            max-width: 90vw;
            margin: 0;
        }
    </style>
</head>
<body>
    <div id="display_element"></div>

    <div id="rotate-overlay">
        <p>Please rotate your device to <strong>portrait</strong> mode to continue.</p>
    </div>
    
    <script type="module">
        // Import task registry functions
        import { createTaskTimeline, getTaskInfo } from '/api/index.js';
        import { enterExperiment } from '/core/utils/index.js';

        // Get parameters from URL
        window.participantID = new URLSearchParams(window.location.search).get('participant_id') || '';
        window.simulating = window.participantID.includes("simulate") || false;

        // Initialize jsPsych
        window.jsPsych = initJsPsych({
            display_element: 'display_element',
            on_finish: function(data) {
                // Display results
                jsPsych.getDisplayElement().innerHTML = '<p>Experiment complete. Thank you for participating!</p>';
                console.log('Experiment data:', data.values());
            }
        });


        // Function to run the experiment
        async function runExperiment() {
            try {
                console.log('Starting vigour task...');
                
                // Get task information
                const taskInfo = getTaskInfo('vigour');
                console.log('Task info:', taskInfo);
                
                // Create the task timeline with default settings
                const timeline = await createTaskTimeline('vigour', {session: "wk0"});
                console.log('Timeline created:', timeline);
                
                const exitFullscreen = {
                    type: jsPsychFullscreen,
                    fullscreen_mode: false
                };
                
                // Create the complete timeline
                const fullTimeline = [
                    enterExperiment,
                    ...timeline,
                    exitFullscreen
                ];
                
                // Run the experiment
                if (window.simulating) {
                    console.log('Simulating experiment run...');
                    
                    // Simulation options
                    let simulation_options = {
                            default: {
                                data: {
                                rt: 200
                                }
                            }
                    }

                    await jsPsych.simulate(fullTimeline, "visual", simulation_options);
                } else {
                    console.log('Running experiment...');
                    await jsPsych.run(fullTimeline);
                }
                
            } catch (error) {
                console.error('Error running experiment:', error);
                jsPsych.getDisplayElement().innerHTML = `
                    <div style="text-align: center; padding: 50px;">
                        <h2>Error Loading Experiment</h2>
                        <p>There was an error loading the delay discounting task:</p>
                        <p><strong>${error.message}</strong></p>
                        <p>Please check the console for more details.</p>
                    </div>
                `;
            }
        }

        // Start the experiment when the page loads
        window.addEventListener('load', runExperiment);
    </script>
</body>
</html>
