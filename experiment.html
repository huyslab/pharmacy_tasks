<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study</title>

    <script type="importmap">
        {
            "imports": {
                "@utils/": "./core/utils/",
                "@jspsych/": "./core/jspsych/",
                "@tasks/": "./tasks/",
                "@api/": "./api/",
                "@images/": "./assets/images/"
            }
        }
    </script>
    
    <!-- jsPsych Core Files -->
    <script src="core/jspsych/jspsych.js"></script>
    <script src="core/jspsych/plugin-html-keyboard-response.js"></script>
    <script src="core/jspsych/plugin-html-button-response.js"></script>
    <script src="core/jspsych/plugin-instructions.js"></script>
    <script src="core/jspsych/plugin-preload.js"></script>
    <script src="core/jspsych/plugin-call-function.js"></script>
    <script src="core/jspsych/plugin-fullscreen.js"></script>
    <script src="core/jspsych/plugin-survey-multi-choice.js"></script>
    <script src="core/jspsych/plugin-survey-likert.js"></script>

    
    <!-- Task-specific files -->
    <script src="tasks/card-choosing/plugin-card-choosing.js"></script>
    <script src="tasks/control/plugins/plugin-explore-ship.js"></script>
    <script src="tasks/control/plugins/plugin-explore-ship-feedback.js"></script>
    <script src="tasks/control/plugins/plugin-predict-home-base.js"></script>
    <script src="tasks/control/plugins/plugin-reward-ship.js"></script>
    <script src="tasks/control/plugins/plugin-reward-prompt.js"></script>
    <script src="tasks/reversal/plugin-reversal.js"></script>
    <script src="tasks/open-text/plugin-open-text.js"></script>

    
    <!-- Core utilities -->
    <script type="module" src="core/utils/index.js"></script>

    <!-- CSS Styles -->
    <link href="core/jspsych/jspsych.css" rel="stylesheet" type="text/css" />

    <style>
        html, body {
            overscroll-behavior: none; /* disable pull-to-refresh and overscroll bounce during the task */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        
        #display_element {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .instructions p {
            max-width: min(700px, 92vw);
            text-align: left;
            margin: 1em 0;
        }

        /* Orientation gate: on phones, block the wrong orientation for the active task; tablets/
           desktop are exempt (larger min dimension). Driven by
           <body data-preferred-orientation="portrait|landscape">, set per task by the registry. */
        #rotate-overlay {
            display: none;
            flex-direction: column;
            gap: 20px;
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            z-index: 100000;
            background: #ffffff;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            box-sizing: border-box;
        }
        #rotate-overlay p {
            font-size: clamp(18px, 5vw, 24px);
            color: #182b4b;
            line-height: 1.4;
            max-width: 90vw;
            margin: 0;
            display: none;
        }
        .phone-rotate-icon {
            width: 80px;
            height: 80px;
            display: none;
        }
        .phone-rotate-icon svg {
            width: 100%;
            height: 100%;
            transform-origin: center center;
        }
        /* rotate-portrait-from-right: phone rotated CW (angle=90°) → guide CCW back to portrait */
        @keyframes rotate-portrait-from-right {
            0%, 15%  { transform: rotate(90deg); }
            55%, 85% { transform: rotate(0deg); }
            100%     { transform: rotate(90deg); }
        }
        /* rotate-portrait-from-left: phone rotated CCW (angle=270°) → guide CW back to portrait */
        @keyframes rotate-portrait-from-left {
            0%, 15%  { transform: rotate(-90deg); }
            55%, 85% { transform: rotate(0deg); }
            100%     { transform: rotate(-90deg); }
        }
        @keyframes rotate-to-landscape {
            0%, 15%  { transform: rotate(0deg); }
            55%, 85% { transform: rotate(90deg); }
            100%     { transform: rotate(0deg); }
        }
        /* Portrait-preferred task on a phone held in landscape */
        @media (orientation: landscape) and (max-height: 500px) {
            body[data-preferred-orientation="portrait"] #rotate-overlay { display: flex; }
            body[data-preferred-orientation="portrait"] #rotate-overlay .rotate-msg-portrait { display: block; }
            body[data-preferred-orientation="portrait"] .phone-rotate-icon { display: block; }
            /* Default: device tilted CW / top pointing right (angle=270) → guide CCW back */
            body[data-preferred-orientation="portrait"] .phone-rotate-icon svg { animation: rotate-portrait-from-right 2.5s ease-in-out infinite; }
            /* Override: device tilted CCW / top pointing left (angle=90) → guide CW back */
            body[data-preferred-orientation="portrait"][data-orientation-angle="90"] .phone-rotate-icon svg { animation: rotate-portrait-from-left 2.5s ease-in-out infinite; }
        }
        /* Landscape-preferred task on a phone held in portrait */
        @media (orientation: portrait) and (max-width: 500px) {
            body[data-preferred-orientation="landscape"] #rotate-overlay { display: flex; }
            body[data-preferred-orientation="landscape"] #rotate-overlay .rotate-msg-landscape { display: block; }
            body[data-preferred-orientation="landscape"] .phone-rotate-icon { display: block; }
            body[data-preferred-orientation="landscape"] .phone-rotate-icon svg { animation: rotate-to-landscape 2.5s ease-in-out infinite; }
        }
    </style>
</head>
<body>
    <div id="display_element"></div>

    <div id="rotate-overlay">
        <div class="phone-rotate-icon">
            <svg viewBox="0 0 60 100" xmlns="http://www.w3.org/2000/svg">
                <rect x="2" y="2" width="56" height="96" rx="10" fill="#182b4b"/>
                <rect x="6" y="14" width="48" height="72" rx="5" fill="#e2e8f2"/>
                <circle cx="30" cy="7" r="3" fill="#4a6fa5"/>
                <rect x="20" y="90" width="20" height="4" rx="2" fill="#4a6fa5"/>
            </svg>
        </div>
        <p class="rotate-msg-portrait">Please rotate your device to <strong>portrait</strong> mode to continue.</p>
        <p class="rotate-msg-landscape">Please rotate your device to <strong>landscape</strong> mode to continue.</p>
    </div>
    
    <script>
        (function () {
            function setOrientationAngle() {
                var angle = (screen.orientation ? screen.orientation.angle : (window.orientation || 0));
                // Normalise to 0–359 (window.orientation can return -90)
                document.body.setAttribute('data-orientation-angle', String(((angle % 360) + 360) % 360));
            }
            setOrientationAngle();
            window.addEventListener('orientationchange', setOrientationAngle);
            window.addEventListener('resize', setOrientationAngle);
        })();
    </script>

    <script type="module">
        // Import task registry functions
        import { createModuleTimeline, getModuleInfo } from '@api/index.js';
        import { enterExperiment } from '@utils/index.js';

        // Get parameters from URL
        window.participantID = new URLSearchParams(window.location.search).get('participant_id') || '';
        window.simulating = window.participantID.includes("simulate") || false;
        console.log(window.simulating);

        // Initialize jsPsych
        window.jsPsych = initJsPsych({
            display_element: 'display_element',
            on_finish: function(data) {
                // Display results
                jsPsych.getDisplayElement().innerHTML = session == "screening" ? '<p>Thank you for participating! You may now close this tab.</p>' : '<p>Thank you for participating! Please call the experimenter.</p>';
            }
        });

        // Configurations
        window.session = new URLSearchParams(window.location.search).get('session') || 'wk0';
        window.module = new URLSearchParams(window.location.search).get('module') ;

        const settings = {
            sequence: window.session,
            session: window.session
        };

        // Function to run the experiment
        async function runExperiment() {
            try {
                // Which module to run
                const module_name = session == "screening" ? 'screening' : 'full_battery';

                // Get module information
                const moduleInfo = getModuleInfo(module_name);
                console.log('Module info:', moduleInfo);

                // Create the timeline
                const timeline = await createModuleTimeline(module_name, settings);
                console.log('Timeline created:', timeline);
                
                const exitFullscreen = {
                    type: jsPsychFullscreen,
                    fullscreen_mode: false
                };
                
                // Create the complete timeline
                const fullTimeline = [
                    enterExperiment,
                    ...timeline,
                    exitFullscreen
                ];
                
                // Run the experiment
                if (window.simulating) {
                    console.log('Simulating experiment run...');
                    
                    // Simulation options
                    let simulation_options = {
                            default: {
                                data: {
                                    rt: 200,
                                    speed_up: true,
                                    speed_up_factor: 10,
                                }
                            }
                    }

                    await jsPsych.simulate(fullTimeline, "visual", simulation_options);
                } else {
                    console.log('Running experiment...');
                    await jsPsych.run(fullTimeline);
                }
                
            } catch (error) {
                console.error('Error running experiment:', error);
                jsPsych.getDisplayElement().innerHTML = `
                    <div style="text-align: center; padding: 50px;">
                        <h2>Error Loading Experiment</h2>
                        <p>There was an error loading the card choosing task:</p>
                        <p><strong>${error.message}</strong></p>
                        <p>Please check the console for more details.</p>
                    </div>
                `;
            }
        }

        // Start the experiment when the page loads
        window.addEventListener('load', runExperiment);
    </script>
</body>
</html>
